<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />

  <title>Personal Ops</title>

  <link rel="manifest" href="/personal-ops-voice/manifest.json">
<link rel="icon" href="/personal-ops-voice/icon-192.png" type="image/png">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Personal Ops">

  <style>
    :root {
      --bg1: #eef4ff;
      --bg2: #f8fafc;
      --card: rgba(255, 255, 255, 0.96);
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --green-bg: #dcfce7;
      --green-text: #166534;
      --red-bg: #fee2e2;
      --red-text: #991b1b;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #dbeafe 0, transparent 36%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    }

    body {
      min-height: 100svh;
    }

    .shell {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
    }

    .app {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 18px 0 16px;
      display: flex;
      flex-direction: column;
      min-height: 100svh;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 2px 16px;
    }

    .title-block {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
    }

    .status-dot {
      background: #dbeafe;
      color: #1d4ed8;
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .card {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--card);
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: 30px;
      padding: 14px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.10);
      backdrop-filter: blur(12px);
    }

    textarea {
      flex: 1;
      width: 100%;
      min-height: 360px;
      resize: none;
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      font-size: 20px;
      line-height: 1.45;
      color: var(--text);
      background: #fbfdff;
      outline: none;
    }

    textarea:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.13);
      background: #ffffff;
    }

    textarea::placeholder {
      color: #94a3b8;
    }

    .helper {
      padding: 12px 4px 13px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 92px;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 17px 14px;
      font-size: 17px;
      font-weight: 850;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .mic {
      background: #0f172a;
      color: #ffffff;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.22);
    }

    .mic:active {
      transform: translateY(1px);
    }

    .capture {
      background: var(--blue);
      color: #ffffff;
      box-shadow: 0 14px 26px rgba(37, 99, 235, 0.28);
    }

    .capture:active {
      background: var(--blue-dark);
      transform: translateY(1px);
    }

    .clear {
      background: #eef2f7;
      color: #334155;
    }

    .clear:active {
      background: #e2e8f0;
    }

    .status {
      display: none;
      margin-top: 12px;
      padding: 13px 14px;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 750;
      line-height: 1.3;
    }

    .status.success {
      display: block;
      background: var(--green-bg);
      color: var(--green-text);
    }

    .status.error {
      display: block;
      background: var(--red-bg);
      color: var(--red-text);
    }

    .footer {
      padding: 14px 8px 0;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    iframe {
      display: none;
    }

    @media (max-width: 430px) {
      .shell {
        padding-left: 10px;
        padding-right: 10px;
      }

      .app {
        padding-top: 14px;
      }

      h1 {
        font-size: 28px;
      }

      .subtitle {
        font-size: 13px;
      }

      .status-dot {
        font-size: 11px;
        padding: 7px 9px;
      }

      .card {
        border-radius: 26px;
        padding: 12px;
      }

      textarea {
        min-height: 370px;
        font-size: 19px;
        border-radius: 22px;
      }

      .buttons {
        grid-template-columns: 1fr;
      }

      .clear {
        padding: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <main class="app">
      <section class="top">
        <div class="title-block">
          <h1>Personal Ops</h1>
          <div class="subtitle">Speak. Capture. Route.</div>
        </div>
        <div class="status-dot">AI Parser</div>
      </section>

      <section class="card">
        <textarea
          id="dump"
          autocomplete="off"
          spellcheck="true"
          placeholder="Tap Dictate, then use your keyboard mic…

Example:
Buy apples and bananas. Ursula appointment hospital tomorrow at 3 PM. Follow up Siemens proposal today."
        ></textarea>

        <div class="helper">
          Tap Dictate to open the keyboard, then tap your keyboard microphone. Review quickly, then press Capture.
        </div>

        <div class="buttons">
          <button class="mic" type="button" onclick="openKeyboard()">🎙️ Dictate</button>
          <button class="capture" id="captureButton" type="button" onclick="capture()">Capture</button>
          <button class="clear" type="button" onclick="clearBox()">Clear</button>
        </div>

        <div id="status" class="status"></div>
      </section>

      <div class="footer">
        Routes to Tasks, Shopping, Waiting, Someday, or Calendar Queue automatically.
      </div>
    </main>
  </div>

  <form
    id="postForm"
    method="GET"
    target="hiddenFrame"
    action="https://script.google.com/macros/s/AKfycby2IGJ7sEgSJWTR9g9xFIzJyE5hl5El-hrLpaRL81xC-OzE-MrhCXSYhLKQzdhJk3i_/exec"
  >
    <input type="hidden" name="token" value="PersonalOpsPrivate2026">
    <input type="hidden" id="hiddenDump" name="dump" value="">
  </form>

  <iframe name="hiddenFrame"></iframe>

  <script>
    const textarea = document.getElementById("dump");
    const statusBox = document.getElementById("status");
    const captureButton = document.getElementById("captureButton");

    const draft = localStorage.getItem("personalOpsDraft");

    if (draft) {
      textarea.value = draft;
    }

    textarea.addEventListener("input", function () {
      localStorage.setItem("personalOpsDraft", textarea.value);
    });

    function setStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = "status " + type;
    }

    function openKeyboard() {
      textarea.focus();

      const length = textarea.value.length;
      textarea.setSelectionRange(length, length);

      setStatus("Keyboard opened. Tap your keyboard mic to dictate.", "success");
    }

    function clearBox() {
      textarea.value = "";
      localStorage.removeItem("personalOpsDraft");

      statusBox.textContent = "";
      statusBox.className = "status";

      textarea.focus();
    }

    function capture() {
      const text = textarea.value.trim();

      if (!text) {
        setStatus("Nothing to capture.", "error");
        textarea.focus();
        return;
      }

      document.getElementById("hiddenDump").value = text;

      captureButton.disabled = true;
      captureButton.textContent = "Capturing…";

      setStatus("Sending to Personal Ops…", "success");

      document.getElementById("postForm").submit();

      setTimeout(function () {
        textarea.value = "";
        localStorage.removeItem("personalOpsDraft");

        captureButton.disabled = false;
        captureButton.textContent = "Capture";

        setStatus("Captured. Check Tasks in a few seconds.", "success");
        textarea.focus();
      }, 1200);
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./service-worker.js");
      });
    }
  </script>
</body>
</html>
```
